services:
- type: web
  name: valkyrie-menu-bot
  runtime: python
  plan: free
  buildCommand: pip install -r requirements.txt
  startCommand: python bots/menu_bot.py
  healthCheckPath: /health
  envVars:
  - key: PYTHON_VERSION
    value: 3.11.0
  - key: VALKYRIEMENU_BOT_TOKEN
    sync: false
  - key: GROK_API_KEY
    sync: false
  - key: OPENROUTER_API_KEY
    sync: false
  autoDeploy: true
